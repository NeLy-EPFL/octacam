<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>octacam</title>
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div id="banner" class="hidden"></div>

  <main id="grid"></main>

  <aside id="sidebar">
    <nav id="tabs">
      <button type="button" data-tab="record" class="active">Record</button>
      <button type="button" data-tab="camera">Camera</button>
      <button type="button" data-tab="view">View</button>
      <button type="button" data-tab="arduino">Arduino</button>
    </nav>

    <section id="tab-record" class="tab active">
      <fieldset id="record-fields" disabled>
        <label class="row"><span>Duration:</span>
          <span class="duration">
            <input id="duration-value" type="number" min="0.01" step="any" value="20">
            <select id="duration-unit">
              <option value="1" selected>s</option>
              <option value="60">min</option>
              <option value="3600">h</option>
            </select>
          </span>
        </label>
        <label class="row"><span>FPS:</span>
          <input id="fps" type="number" min="0.01" max="1000" step="1">
        </label>
        <div class="col">
          <label class="col-label" for="save-dir">Save directory:</label>
          <textarea id="save-dir" rows="3" spellcheck="false"></textarea>
          <div class="save-dir-foot">
            <button type="button" id="browse-dir-btn" class="btn">Browse…</button>
            <span id="disk-free"></span>
          </div>
        </div>
        <label class="row"><span>Trigger source:</span>
          <select id="trigger-source">
            <option value="software">software</option>
            <option value="external">external</option>
          </select>
        </label>
        <label class="row"><span>Format:</span>
          <select id="format"></select>
        </label>
        <label class="row"><span>Saved image:</span>
          <select id="record-form">
            <option value="display">display (rotated/flipped)</option>
            <option value="sensor">sensor (raw)</option>
          </select>
        </label>
        <label class="row"><span>Per-frame timestamp CSV:</span>
          <input id="save-frame-timestamps" type="checkbox">
        </label>
      </fieldset>
      <button type="button" id="record-button" class="start" disabled>Start recording</button>
      <div id="record-status"></div>
      <div id="record-progress" class="hidden"><div id="record-progress-bar"></div></div>
    </section>

    <section id="tab-camera" class="tab">
      <fieldset id="camera-fields" disabled>
        <label class="row"><span>Camera:</span>
          <select id="cam-target"></select>
        </label>
        <div class="row"><span>Apply to:</span>
          <span class="radio-group">
            <label><input type="radio" name="cam-apply-to" value="selected" checked> Selected</label>
            <label><input type="radio" name="cam-apply-to" value="all"> All</label>
          </span>
        </div>
        <label class="row"><span>Width:</span>
          <input id="cam-width" type="number" step="1">
        </label>
        <span class="node-range" id="cam-width-range"></span>
        <label class="row"><span>Height:</span>
          <input id="cam-height" type="number" step="1">
        </label>
        <span class="node-range" id="cam-height-range"></span>
        <label class="row"><span>Exposure:</span>
          <span class="suffixed">
            <input id="cam-exposure" type="number" step="any">
            <span class="suffix">&micro;s</span>
          </span>
        </label>
        <span class="node-range" id="cam-exposure-range"></span>
        <details id="cam-advanced">
          <summary>Advanced</summary>
          <label class="row"><span>Gain:</span>
            <input id="cam-gain" type="number" step="any">
          </label>
          <span class="node-range" id="cam-gain-range"></span>
          <label class="row"><span>Offset X:</span>
            <input id="cam-offset_x" type="number" step="1">
          </label>
          <span class="node-range" id="cam-offset_x-range"></span>
          <label class="row"><span>Offset Y:</span>
            <input id="cam-offset_y" type="number" step="1">
          </label>
          <span class="node-range" id="cam-offset_y-range"></span>
        </details>
        <button id="cam-reset" type="button" class="btn wide"
          title="Reset sensor parameters to the active config's saved values">Reset to config</button>
      </fieldset>
      <div id="camera-status"></div>
    </section>

    <section id="tab-arduino" class="tab">
      <div id="arduino-status" class="plugin-status hidden">
        <span id="arduino-status-msg"></span>
        <button type="button" id="arduino-reconnect" class="btn">Reconnect</button>
      </div>
      <fieldset id="arduino-fields" disabled>
        <h3>Loop</h3>
        <div class="row"><span>Initial direction:</span>
          <span class="radio-group">
            <label><input type="radio" name="loop-dir" id="loop-dir-ccw" checked> &#8634;</label>
            <label><input type="radio" name="loop-dir" id="loop-dir-cw"> &#8635;</label>
          </span>
        </div>
        <label class="row"><span>Steps:</span>
          <input id="loop-steps" type="number" min="2" max="32767" value="4096">
        </label>
        <label class="row"><span>Step interval:</span>
          <span class="suffixed">
            <input id="loop-interval" type="number" min="800" max="65535" value="1465">
            <span class="suffix">&micro;s</span>
          </span>
        </label>
        <label class="row"><span>Rest duration:</span>
          <span class="suffixed">
            <input id="loop-rest" type="number" min="0" max="65535" value="1000">
            <span class="suffix">ms</span>
          </span>
        </label>
        <label class="row"><span>Repeats:</span>
          <input id="loop-repeats" type="number" min="1" max="255" value="3">
        </label>
        <label class="row"><span>Initial wait:</span>
          <span class="suffixed">
            <input id="loop-wait" type="number" min="0" max="255" value="10">
            <span class="suffix">s</span>
          </span>
        </label>
        <div id="loop-info"></div>
        <button type="button" id="loop-execute" class="btn wide">Execute</button>
        <label class="center"><input type="checkbox" id="loop-with-recording" checked> Start with recording</label>

        <h3>Adjust position</h3>
        <label class="row"><span>Step interval:</span>
          <span class="suffixed">
            <input id="jog-interval" type="number" min="1000" max="65535" value="2000">
            <span class="suffix">&micro;s</span>
          </span>
        </label>
        <div class="row"><span>Direction:</span>
          <span class="btn-pair">
            <button type="button" id="jog-ccw" class="btn">&#8634;</button>
            <button type="button" id="jog-cw" class="btn">&#8635;</button>
          </span>
        </div>
      </fieldset>
    </section>

    <section id="tab-view" class="tab">
      <fieldset id="view-fields" disabled>
        <div class="row"><span>Apply to:</span>
          <span class="radio-group">
            <label><input type="radio" name="apply-to" value="selected"> Selected</label>
            <label><input type="radio" name="apply-to" value="all" checked> All</label>
          </span>
        </div>
        <div class="row"><span>Rotate:</span>
          <span class="btn-pair">
            <button type="button" id="rotate-ccw" class="btn">&#8634;</button>
            <button type="button" id="rotate-cw" class="btn">&#8635;</button>
          </span>
        </div>
        <div class="row"><span>Flip:</span>
          <span class="btn-pair">
            <button type="button" id="flip-h" class="btn">Horizontal</button>
            <button type="button" id="flip-v" class="btn">Vertical</button>
          </span>
        </div>
        <button type="button" id="view-reset" class="btn wide">Reset</button>
        <label class="center"><input type="checkbox" id="display-cross"> Display cross</label>
        <label class="center"><input type="checkbox" id="layout-edit"> Edit tile layout</label>
        <div id="layout-hint">Drag a tile to move it; drag its corner to resize.</div>
      </fieldset>
    </section>

    <div id="events"></div>
    <div id="footer">
      <div id="footer-status">
        <span id="version"></span>
        <span id="conn-state"></span>
        <span id="peers" class="hidden" title="Browsers connected to this server"></span>
      </div>
      <div id="footer-actions">
        <button id="save-config-btn" type="button" title="Save camera parameters and layout to a config">Save config…</button>
        <button id="disconnect-btn" type="button">Disconnect</button>
        <button id="shutdown-btn" type="button" title="Stop the octacam server on the rig">Shut down</button>
      </div>
    </div>
  </aside>

  <div id="save-dialog" class="modal hidden">
    <div class="modal-card">
      <h3>Save configuration</h3>
      <div class="row"><span>Target:</span>
        <span class="radio-group">
          <label><input type="radio" name="save-target" value="active" checked> Active</label>
          <label><input type="radio" name="save-target" value="new"> New…</label>
        </span>
      </div>
      <label class="row" id="save-name-row"><span>Name:</span>
        <input id="save-name" type="text" spellcheck="false" placeholder="my_rig">
      </label>
      <label class="check"><input type="checkbox" id="save-sensor" checked> Sensor parameters (.pfs)</label>
      <label class="check"><input type="checkbox" id="save-display" checked> Display layout (.toml)</label>
      <div id="save-error" class="modal-error"></div>
      <div class="modal-actions">
        <button type="button" id="save-cancel" class="btn">Cancel</button>
        <button type="button" id="save-confirm" class="btn">Save</button>
      </div>
    </div>
  </div>

  <div id="dir-dialog" class="modal hidden">
    <div class="modal-card">
      <h3>Choose save directory</h3>
      <div class="dir-current-row">
        <button type="button" id="dir-up" class="btn" title="Parent folder">&#8593;</button>
        <span id="dir-current" class="dir-current"></span>
      </div>
      <div id="dir-list" class="dir-list"></div>
      <label class="row"><span>New folder:</span>
        <input id="dir-new" type="text" spellcheck="false" placeholder="optional subfolder">
      </label>
      <div id="dir-error" class="modal-error"></div>
      <div class="modal-actions">
        <button type="button" id="dir-cancel" class="btn">Cancel</button>
        <button type="button" id="dir-select" class="btn">Use this folder</button>
      </div>
    </div>
  </div>
</body>
</html>
