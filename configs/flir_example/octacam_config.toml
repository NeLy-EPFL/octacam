# Example FLIR / Teledyne (Spinnaker / PySpin) rig.
#
# `backend = "flir"` selects the Spinnaker backend (install the SDK + PySpin
# wheel first; see the README). With no [[cameras]] entries, every detected
# FLIR camera is used; add entries keyed by serial_number to pin names and the
# display layout. Per-camera sensor parameters persist next to this file as
# <serial>.json (written by the web GUI's "Save…" dialog), not as Basler .pfs.
backend = "flir"

[record]
fps = 30.0
duration = 10.0
duration_unit = "seconds"      # frames | seconds | minutes | hours
trigger_source = "software"    # software | external

directory = "~/data"
relative_directory = "%y%m%d/flir/001"

save_method = "ffmpeg"         # ffmpeg | raw
ffmpeg_params = "-c:v libx264 -preset ultrafast -crf 18 -pix_fmt gray"
save_transformed = true
save_timestamps = false

[transcode]
ffmpeg_params = "-c:v libx264 -preset veryslow -crf 20 -pix_fmt gray"

# Pin a camera's name and grid placement (optional). Sensor parameters
# (exposure/gain/ROI) live in <serial>.json, set from the GUI.
# [[cameras]]
# serial_number = "20415678"
# name = "grasshopper_left"
