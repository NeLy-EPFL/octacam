[record]
fps = 100.0
duration = 20.0
duration_unit = "seconds"      # frames | seconds | minutes | hours
trigger_source = "external"    # software | external

directory = "/data/JSP"
relative_directory = "%y%m%d_/Fly1/001"

save_method = "ffmpeg"         # ffmpeg | raw
ffmpeg_params = "-c:v libx264 -preset ultrafast -crf 18 -pix_fmt gray"
save_transformed = true
save_timestamps = false

[transcode]
ffmpeg_params = "-c:v libx264 -preset veryslow -crf 20 -pix_fmt gray"

[[cameras]]
serial_number = "40142907"
name = "camera_RF"
scale_x = -1
scale_y = 1
rotation_deg = 0
window_x = 0.666667
window_y = 0
window_width = 0.333333
window_height = 0.333333

