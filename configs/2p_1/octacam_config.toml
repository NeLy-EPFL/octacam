# NAS export — fill in `directory` to enable transfer during `octacam process`.
# record.directory/relative_directory is mirrored under transfer.directory.
# [transfer]
# directory = "/mnt/nas/matthias"   # e.g. /mnt/nas/matthias
# checksum = true                   # content-verify each copy before promoting it
