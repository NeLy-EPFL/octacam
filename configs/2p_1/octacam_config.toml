[gui]
fps_default = 100.0
duration_default = 5.0
duration_unit_default_index = 0
save_directory_default = "/data/octacam/%y%m%d-genotype/Fly1/001-bhv"
trigger_source_default_index = 0
video_writer_default_index = 0

[[cameras]]
serial_number = "40001978"
name = "camera_LF"
scale_x = 1
scale_y = 1
rotation_deg = 0
window_x = 0.5
window_y = 0.25
window_width = 0.5
window_height = 0.25

[[cameras]]
