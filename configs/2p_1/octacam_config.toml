window_y = 0.75
window_width = 0.5
window_height = 0.25

[[cameras]]
serial_number = "40011466"
name = "camera_RF"
scale_x = 1
scale_y = 1
rotation_deg = 0
window_x = 0
window_y = 0.25
window_width = 0.5
window_height = 0.25

[[cameras]]
serial_number = "40011467"
name = "camera_RM"
scale_x = 1
scale_y = 1
rotation_deg = 0
window_x = 0
